<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cc-agent</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── Reset & Base ─────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #0d0f14;
  --sidebar-bg: #0a0c10;
  --card-bg:    #111318;
  --card-body:  #0d0f14;
  --border:     #1c1f28;
  --border-hi:  #2a2f3d;
  --text:       #c8ccd8;
  --dim:        #484c5e;
  --dimmer:     #2a2d3a;
  --cyan:       #56b6c2;
  --cyan-glow:  rgba(86,182,194,0.12);
  --green:      #98c379;
  --green-glow: rgba(152,195,121,0.1);
  --red:        #e06c75;
  --red-glow:   rgba(224,108,117,0.1);
  --yellow:     #e5c07b;
  --yellow-glow:rgba(229,192,123,0.1);
  --purple:     #c678dd;
  --orange:     #d19a66;
  --blue:       #61afef;
  --font: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
}

html, body { width: 100%; height: 100%; overflow: hidden; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 12px;
  display: flex;
  flex-direction: column;
}

/* ── Top bar ──────────────────────────────────────────────────────────── */
#topbar {
  flex-shrink: 0;
  height: 40px;
  background: var(--sidebar-bg);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 20px;
  z-index: 200;
}

#logo {
  font-size: 13px;
  font-weight: 700;
  color: var(--cyan);
  letter-spacing: 0.05em;
  display: flex;
  align-items: center;
  gap: 7px;
  flex-shrink: 0;
}
#logo-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--cyan);
  box-shadow: 0 0 8px var(--cyan);
  animation: breathe 2.5s ease-in-out infinite;
}
@keyframes breathe {
  0%,100% { opacity:1; transform:scale(1); }
  50%      { opacity:0.4; transform:scale(0.7); }
}

.topbar-sep { width: 1px; height: 20px; background: var(--border); flex-shrink:0; }

#job-counts {
  display: flex; gap: 16px; align-items: center;
}
.jcount {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px;
}
.jcount-n { font-weight: 700; font-size: 14px; }
.jcount-l { color: var(--dim); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; }
.jcount.running .jcount-n { color: var(--cyan); }
.jcount.done    .jcount-n { color: var(--green); }
.jcount.failed  .jcount-n { color: var(--red); }
.jcount.pending .jcount-n { color: var(--yellow); }

.topbar-hint {
  margin-left: auto;
  color: var(--dimmer);
  font-size: 10px;
  letter-spacing: 0.03em;
}

#version-badge {
  font-size: 9px;
  color: var(--dim);
  letter-spacing: 0.02em;
  white-space: nowrap;
  flex-shrink: 0;
}
#version-badge .vb-unknown { color: var(--dimmer); }

#ws-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--dim); flex-shrink:0;
  transition: background 0.3s, box-shadow 0.3s;
}
#ws-dot.ok  { background: var(--green); box-shadow: 0 0 6px var(--green); }
#ws-dot.err { background: var(--red); }

/* ── Layout ───────────────────────────────────────────────────────────── */
#main {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* ── Sidebar ──────────────────────────────────────────────────────────── */
#sidebar {
  width: 260px;
  flex-shrink: 0;
  background: var(--sidebar-bg);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#sidebar-header {
  padding: 10px 14px 8px;
  border-bottom: 1px solid var(--border);
  font-size: 10px;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  display: flex;
  align-items: center;
  gap: 8px;
}
#filter-btns {
  display: flex; gap: 4px; margin-left: auto;
}
.fbtn {
  font-family: var(--font);
  font-size: 9px;
  padding: 2px 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--dim);
  border-radius: 3px;
  cursor: pointer;
  transition: all 0.15s;
}
.fbtn:hover, .fbtn.active { border-color: var(--cyan); color: var(--cyan); }

#job-list {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
#job-list::-webkit-scrollbar { width: 4px; }
#job-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.job-item {
  padding: 9px 14px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s;
  position: relative;
}
.job-item:hover { background: rgba(255,255,255,0.025); }
.job-item.active { background: rgba(86,182,194,0.06); }
.job-item.active::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 2px;
  background: var(--cyan);
}

.ji-top {
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 4px;
}
.ji-status {
  width: 6px; height: 6px; border-radius: 50%;
  flex-shrink: 0;
}
.ji-status.running  { background: var(--cyan); box-shadow: 0 0 5px var(--cyan); animation: breathe 1.5s ease-in-out infinite; }
.ji-status.done     { background: var(--green); }
.ji-status.failed   { background: var(--red); }
.ji-status.cancelled{ background: var(--dim); }
.ji-status.pending_approval { background: var(--yellow); animation: breathe 2s ease-in-out infinite; }
.ji-status.cloning  { background: var(--blue); animation: breathe 1.5s ease-in-out infinite; }

.ji-repo {
  font-size: 9px; color: var(--dim);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  flex: 1;
}
.ji-time { font-size: 9px; color: var(--dimmer); flex-shrink: 0; }

.ji-task {
  font-size: 10px; color: var(--text);
  overflow: hidden; text-overflow: ellipsis;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  line-height: 1.5;
}

/* ── Viewport (infinite canvas container) ─────────────────────────────── */
#viewport {
  flex: 1;
  overflow: hidden;
  position: relative;
  cursor: grab;
  background:
    radial-gradient(circle at 50% 50%, rgba(86,182,194,0.03) 0%, transparent 70%),
    var(--bg);
  /* dot grid */
  background-image:
    radial-gradient(circle, var(--dimmer) 1px, transparent 1px);
  background-size: 28px 28px;
}
#viewport:active { cursor: grabbing; }

/* mini-map hint */
#zoom-hint {
  position: absolute;
  bottom: 12px; right: 14px;
  font-size: 10px; color: var(--dim);
  pointer-events: none;
  z-index: 10;
}

#canvas-inner {
  position: absolute;
  top: 0; left: 0;
  transform-origin: 0 0;
  display: flex;
  flex-direction: row;
  align-items: flex-start;
  gap: 18px;
  padding: 24px;
  width: max-content;
}

/* ── Repo Column ──────────────────────────────────────────────────────── */
.repo-col {
  display: flex;
  flex-direction: column;
  gap: 10px;
  width: 460px;
  flex-shrink: 0;
}

.col-header {
  padding: 8px 12px;
  background: rgba(0,0,0,0.35);
  border: 1px solid var(--border);
  border-radius: 5px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.col-repo-icon { color: var(--dimmer); font-size: 12px; }
.col-repo-name {
  font-size: 11px; font-weight: 600; color: var(--blue);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  flex: 1;
}
.col-counts { font-size: 9px; color: var(--dim); flex-shrink: 0; }
.col-counts.live { color: var(--cyan); }

.col-cards {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* ── Terminal Card ────────────────────────────────────────────────────── */
.tcard {
  width: 460px;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: border-color 0.25s, box-shadow 0.25s;
  position: relative;
}

/* status colors */

.tcard.done     { border-color: #1e2d1e; box-shadow: 0 0 16px var(--green-glow); }
.tcard.failed   { border-color: #2d1e20; box-shadow: 0 0 16px var(--red-glow); }
.tcard.pending_approval { border-color: #2d2a1e; box-shadow: 0 0 16px var(--yellow-glow); }
.tcard.cloning  { border-color: #1e2233; box-shadow: 0 0 16px rgba(97,175,239,0.1); }

@keyframes border-race {
  0%   { box-shadow: 0 -1px 4px 0px #60a5fa, inset 0 0 0 1px #1e3a8a, 0 0 10px rgba(59,130,246,0.12); }
  25%  { box-shadow: 2px 0 4px 0px #60a5fa, inset 0 0 0 1px #1e3a8a, 0 0 10px rgba(59,130,246,0.12); }
  50%  { box-shadow: 0 2px 4px 0px #60a5fa, inset 0 0 0 1px #1e3a8a, 0 0 10px rgba(59,130,246,0.12); }
  75%  { box-shadow: -2px 0 4px 0px #60a5fa, inset 0 0 0 1px #1e3a8a, 0 0 10px rgba(59,130,246,0.12); }
  100% { box-shadow: 0 -1px 4px 0px #60a5fa, inset 0 0 0 1px #1e3a8a, 0 0 10px rgba(59,130,246,0.12); }
}

.tcard.running {
  border-color: #1e3a8a;
  animation: border-race 2s linear infinite;
}

/* ── Card Header ── */
.card-hdr {
  display: flex;
  align-items: center;
  padding: 0 12px;
  height: 36px;
  gap: 8px;
  border-bottom: 1px solid var(--border);
  background: rgba(0,0,0,0.2);
  flex-shrink: 0;
  cursor: pointer;
}
.card-hdr:hover { background: rgba(255,255,255,0.04); }

.card-num {
  font-size: 10px;
  font-weight: 700;
  color: var(--dim);
  flex-shrink: 0;
}
.card-title {
  font-size: 11px;
  font-weight: 600;
  color: var(--text);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  flex: 1;
  letter-spacing: 0.01em;
}
.card-status-badge {
  font-size: 9px;
  padding: 2px 7px;
  border-radius: 3px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 600;
  flex-shrink: 0;
}
.badge-running  { background: rgba(86,182,194,0.15); color: var(--cyan);   border: 1px solid rgba(86,182,194,0.3); }
.badge-done     { background: rgba(152,195,121,0.15); color: var(--green);  border: 1px solid rgba(152,195,121,0.3); }
.badge-failed   { background: rgba(224,108,117,0.15); color: var(--red);    border: 1px solid rgba(224,108,117,0.3); }
.badge-cancelled{ background: rgba(72,76,94,0.3);     color: var(--dim);    border: 1px solid var(--border); }
.badge-pending_approval { background: rgba(229,192,123,0.15); color: var(--yellow); border: 1px solid rgba(229,192,123,0.3); }
.badge-cloning  { background: rgba(97,175,239,0.15); color: var(--blue);    border: 1px solid rgba(97,175,239,0.3); }

.card-id {
  font-size: 9px;
  color: var(--dimmer);
  flex-shrink: 0;
  font-weight: 400;
}
/* traffic lights */
.card-dots { display:flex; gap:5px; margin-left:6px; flex-shrink:0; }
.card-dot  { width:9px; height:9px; border-radius:50%; }
.dot-r { background:#e06c75; }
.dot-y { background:#e5c07b; }
.dot-g { background:#98c379; }

/* ── Card repo bar ── */
.card-repo {
  padding: 5px 12px;
  font-size: 9px;
  color: var(--dim);
  border-bottom: 1px solid var(--border);
  background: rgba(0,0,0,0.1);
  display: flex; align-items: center; gap: 8px;
  flex-shrink: 0;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.card-repo-icon { color: var(--dimmer); }
.card-branch { color: var(--purple); margin-left: auto; flex-shrink:0; }
.card-docker-badge { color: #38bdf8; font-size:9px; background: rgba(56,189,248,.12); border:1px solid rgba(56,189,248,.3); border-radius:3px; padding:1px 5px; flex-shrink:0; }

/* ── Terminal body ── */
.card-term {
  flex: 1;
  background: var(--card-body);
  padding: 10px 12px;
  overflow-y: auto;
  min-height: 220px;
  max-height: 300px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
  font-size: 11px;
  line-height: 1.65;
}
.card-term::-webkit-scrollbar { width: 4px; }
.card-term::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 2px; }

/* Output line coloring */
.tl { white-space: pre-wrap; word-break: break-all; }
.tl-sys  { color: #7a8099; }              /* [cc-agent] meta lines */
.tl-ok   { color: var(--green); }         /* success */
.tl-err  { color: var(--red); }           /* errors */
.tl-warn { color: var(--yellow); }        /* warnings */
.tl-tool { color: var(--blue); opacity: 0.8; font-size: 10px; } /* tool calls */
.tl-file { color: var(--orange); }        /* file operations */
.tl-head { color: var(--cyan); font-weight:600; }  /* bold headings */
.tl-dim  { color: var(--dim); }           /* faded */
.tl-new  { color: var(--text); animation: fadein 0.25s ease-out; }
@keyframes fadein { from { opacity:0; } to { opacity:1; } }

/* ── Card footer (prompt bar) ── */
.card-foot {
  border-top: 1px solid var(--border);
  background: rgba(0,0,0,0.2);
  padding: 5px 12px;
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
  min-height: 28px;
}
.card-prompt {
  font-size: 10px; color: var(--dim);
  display: flex; align-items: center; gap: 6px;
}
.prompt-arrow { color: var(--red); font-size: 11px; font-weight:700; }
.card-foot-meta { margin-left: auto; font-size: 9px; color: var(--dimmer); white-space:nowrap; }

/* ── Flash animations ── */
@keyframes flash-g { 0%{background:rgba(152,195,121,0.2)} 100%{background:var(--card-bg)} }
@keyframes flash-r { 0%{background:rgba(224,108,117,0.2)} 100%{background:var(--card-bg)} }
.flash-ok  { animation: flash-g 0.8s ease-out; }
.flash-err { animation: flash-r 0.8s ease-out; }

/* ── File Browser Modal ──────────────────────────────────────────────────── */
.fb-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
}
.fb-backdrop.hidden { display: none; }

#fb-modal {
  background: #0d1117;
  border: 1px solid #2a2d3a;
  border-radius: 8px;
  width: 80vw;
  max-width: 900px;
  height: 80vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 24px 64px rgba(0,0,0,0.7);
}

#fb-modal-header {
  display: flex;
  align-items: center;
  padding: 0 14px;
  height: 42px;
  border-bottom: 1px solid var(--border);
  gap: 10px;
  flex-shrink: 0;
  background: rgba(0,0,0,0.3);
}
#fb-path {
  flex: 1;
  font-size: 11px;
  color: var(--cyan);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  cursor: default;
  font-family: var(--font);
}
#fb-close {
  background: transparent;
  border: none;
  color: var(--dim);
  font-size: 16px;
  cursor: pointer;
  padding: 0 4px;
  line-height: 1;
  font-family: var(--font);
}
#fb-close:hover { color: var(--text); }
#fb-back {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--dim);
  font-size: 10px;
  cursor: pointer;
  padding: 2px 8px;
  border-radius: 3px;
  font-family: var(--font);
}
#fb-back:hover { color: var(--text); border-color: var(--border-hi); }

#fb-body {
  flex: 1;
  overflow: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

/* Directory listing */
.fb-entry {
  display: flex;
  align-items: center;
  padding: 7px 14px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  gap: 10px;
  font-size: 11px;
  transition: background 0.12s;
}
.fb-entry:hover { background: rgba(255,255,255,0.03); }
.fb-icon { font-size: 13px; flex-shrink: 0; width: 18px; text-align: center; }
.fb-name { flex: 1; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.fb-entry.is-dir .fb-name { color: var(--blue); }
.fb-size { font-size: 9px; color: var(--dim); flex-shrink: 0; }

/* File view */
#fb-file-view {
  padding: 12px 14px;
  font-size: 11px;
  line-height: 1.65;
  white-space: pre-wrap;
  word-break: break-all;
  color: var(--text);
}
#fb-file-view.media-view {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
#fb-file-view img, #fb-file-view video, #fb-file-view audio {
  max-width: 100%;
  max-height: calc(100vh - 120px);
  border-radius: 4px;
}

/* ── Job Detail Panel ────────────────────────────────────────────────────── */
#jobpanel {
  position: fixed;
  top: 40px; right: 0; bottom: 0;
  width: 600px;
  background: var(--sidebar-bg);
  border-left: 1px solid var(--border-hi);
  display: flex;
  flex-direction: column;
  z-index: 600;
  transform: translateX(100%);
  transition: transform 0.22s cubic-bezier(.4,0,.2,1);
}
#jobpanel.open { transform: translateX(0); }

#jp-topbar {
  display: flex; align-items: center;
  padding: 0 14px; height: 44px;
  border-bottom: 1px solid var(--border);
  gap: 10px; flex-shrink: 0;
}
#jp-title {
  flex: 1; font-size: 11px; font-weight: 600;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
#jp-close {
  background: transparent; border: none;
  color: var(--dim); font-size: 16px; cursor: pointer;
  padding: 0 4px; line-height: 1; font-family: var(--font);
}
#jp-close:hover { color: var(--text); }

#jp-meta {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  display: flex; flex-wrap: wrap; gap: 8px;
  flex-shrink: 0;
}
.jp-badge {
  font-size: 9px; padding: 3px 8px; border-radius: 3px;
  text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600;
}
.jp-meta-row {
  width: 100%; font-size: 10px; color: var(--dim);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.jp-meta-row span { color: var(--text); }

#jp-actions {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  display: flex; gap: 8px; flex-shrink: 0;
  flex-wrap: wrap;
}
.jp-btn {
  font-family: var(--font); font-size: 10px;
  padding: 5px 14px; border-radius: 4px; cursor: pointer;
  border: 1px solid var(--border); background: transparent;
  color: var(--text); transition: all 0.15s;
  font-weight: 600; letter-spacing: 0.04em;
}
.jp-btn:hover { border-color: var(--border-hi); background: rgba(255,255,255,0.04); }
.jp-btn.approve { border-color: rgba(152,195,121,0.5); color: var(--green); }
.jp-btn.approve:hover { background: rgba(152,195,121,0.12); }
.jp-btn.cancel  { border-color: rgba(224,108,117,0.5); color: var(--red); }
.jp-btn.cancel:hover  { background: rgba(224,108,117,0.12); }
.jp-btn.wake    { border-color: rgba(229,192,123,0.5); color: var(--yellow); }
.jp-btn.wake:hover    { background: rgba(229,192,123,0.12); }
.jp-btn:disabled { opacity: 0.35; cursor: not-allowed; }

#jp-log {
  flex: 1; overflow-y: auto;
  padding: 10px 14px;
  font-size: 11px; line-height: 1.65;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
  background: var(--card-body);
}
#jp-log::-webkit-scrollbar { width: 4px; }
#jp-log::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 2px; }

#jp-task {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  font-size: 10px; color: var(--dim);
  max-height: 100px; overflow-y: auto;
  flex-shrink: 0;
  white-space: pre-wrap; word-break: break-word;
  line-height: 1.6;
}
#jp-task strong { color: var(--text); display: block; margin-bottom: 4px; font-size: 9px; text-transform: uppercase; letter-spacing: 0.08em; }

/* Clickable file paths in terminal */
.tl-path {
  color: #f4a261;
  text-decoration: underline dotted;
  cursor: pointer;
  border-radius: 2px;
}
.tl-path:hover { color: #ffd166; }
.tl-url {
  color: #61afef;
  text-decoration: underline;

<script>
// ── State ──────────────────────────────────────────────────────────────────
const jobs = {};          // id → { job, card, logEl, n }
const cols = {};          // repoKey → { el, cardsEl }
let filterMode = 'all';
let jobCounter = 0;
let scale = 1, ox = 40, oy = 40;
let dragging = false, dragX = 0, dragY = 0;

const $ = id => document.getElementById(id);
const viewport   = $('viewport');
const inner      = $('canvas-inner');
const jobList    = $('job-list');
const emptyState = $('empty-state');
const zoomHint   = $('zoom-hint');

// ── Pan / Zoom ─────────────────────────────────────────────────────────────
function applyTransform() {
  inner.style.transform = `translate(${ox}px, ${oy}px) scale(${scale})`;
  zoomHint.textContent = `${Math.round(scale * 100)}%`;
}
applyTransform();

viewport.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.08 : 0.93;
  const newScale = Math.max(0.25, Math.min(2.5, scale * factor));
  // Zoom toward mouse position
  const rect = viewport.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  ox = mx - (mx - ox) * (newScale / scale);
  oy = my - (my - oy) * (newScale / scale);
  scale = newScale;
  applyTransform();
}, { passive: false });

viewport.addEventListener('mousedown', e => {
  if (e.target.closest('.tcard')) return; // don't drag on cards
  dragging = true; dragX = e.clientX; dragY = e.clientY;
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  ox += e.clientX - dragX; oy += e.clientY - dragY;
  dragX = e.clientX; dragY = e.clientY;
  applyTransform();
});
window.addEventListener('mouseup', () => dragging = false);

// Touch pan/pinch
let lastTouchDist = null, lastTouchX = 0, lastTouchY = 0;
viewport.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    lastTouchX = e.touches[0].clientX;
    lastTouchY = e.touches[0].clientY;
  } else if (e.touches.length === 2) {
    lastTouchDist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
  }
}, { passive: true });

viewport.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1) {
    ox += e.touches[0].clientX - lastTouchX;
    oy += e.touches[0].clientY - lastTouchY;
    lastTouchX = e.touches[0].clientX;
    lastTouchY = e.touches[0].clientY;
    applyTransform();
  } else if (e.touches.length === 2) {
    const dist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    if (lastTouchDist) {
      scale = Math.max(0.25, Math.min(2.5, scale * (dist / lastTouchDist)));
      applyTransform();
    }
    lastTouchDist = dist;
  }
}, { passive: false });

// ── Log line colorizer ─────────────────────────────────────────────────────
const TOOL_ICONS = {
  Read:'📖', Edit:'✏️', Write:'💾', Bash:'$', Glob:'🔍', Grep:'🔎',
  WebFetch:'🌐', WebSearch:'🌐', TodoWrite:'✅', Agent:'🤖',
  MultiEdit:'✏️', NotebookEdit:'📓', Dispatch:'⚡',
};

function classifyLine(raw) {
  const s = raw.replace(/\x1b\[[0-9;]*m/g, '').trim();
  if (!s) return null;
  if (s.startsWith('[tool] '))           return 'tl tl-tool';
  if (s.startsWith('[you] '))            return 'tl tl-head';
  if (s.startsWith('[cc-agent]'))        return 'tl tl-sys';
  if (/✓|✅|PASS|passed|merged|pushed|success/i.test(s)) return 'tl tl-ok';
  if (/✗|❌|error|Error|FAIL|failed|exception/i.test(s)) return 'tl tl-err';
  if (/⚠|warn|Warning/i.test(s))        return 'tl tl-warn';
  if (/^(Read|Edit|Write|Bash|Glob|Grep|WebFetch|WebSearch|TodoWrite|Agent)\b/.test(s)) return 'tl tl-tool';
  if (/\.(ts|js|tsx|jsx|py|go|rs|md|json|yaml|sh)\b/.test(s)) return 'tl tl-file';
  if (/^#{1,3}\s|^\*\*/.test(s))         return 'tl tl-head';
  if (/^[\-–—>·]/.test(s))              return 'tl tl-dim';
  return 'tl';
}

function formatLine(raw) {
  const s = raw.replace(/\x1b\[[0-9;]*m/g, '');
  // Enrich [tool] lines with icon
  const toolMatch = s.match(/^\[tool\] ([\w-]+)(.*)/);
  if (toolMatch) {
    const icon = TOOL_ICONS[toolMatch[1]] || '⚙';
    return `${icon} ${toolMatch[1]}${toolMatch[2]}`;
  }
  return s;
}

function appendLines(logEl, lines, isNew) {
  // Remove working indicator if present
  const working = logEl.querySelector('.term-working');
  if (working && lines.some(l => l.trim())) working.remove();

  const frag = document.createDocumentFragment();
  for (const raw of lines) {
    const cls = classifyLine(raw);
    if (!cls) continue;
    const d = document.createElement('div');
    d.className = isNew ? cls + ' tl-new' : cls;
    const clean = formatLine(raw);
    d.innerHTML = linkifyPaths(clean);
    if (isNew) setTimeout(() => d.classList.remove('tl-new'), 1500);
    frag.appendChild(d);
  }
  const atBottom = logEl.scrollHeight - logEl.scrollTop - logEl.clientHeight < 40;
  logEl.appendChild(frag);
  while (logEl.children.length > 300) logEl.removeChild(logEl.firstChild);
  if (atBottom) logEl.scrollTop = logEl.scrollHeight;
}

function setWorkingIndicator(logEl, show) {
  const existing = logEl.querySelector('.term-working');
  if (show && !existing && logEl.children.length === 0) {
    const d = document.createElement('div');
    d.className = 'term-working';
    d.innerHTML = '<span class="term-spinner">⟳</span> Claude is working…';
    logEl.appendChild(d);
  } else if (!show && existing) {
    existing.remove();
  }
}

// ── Card factory ───────────────────────────────────────────────────────────
function shortRepo(url) {
  if (!url) return 'local';
  const m = url.match(/github\.com\/([^/]+\/[^/]+)/);
  return m ? m[1] : url;
}

function timeAgo(iso) {
  if (!iso) return '';
  const s = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
  if (s < 60)   return `${s}s ago`;
  if (s < 3600) return `${Math.floor(s/60)}m ago`;
  return `${Math.floor(s/3600)}h ago`;
}

function shortTask(task) {
  if (!task) return '(no task)';
  // Strip "RESUMING interrupted job..." prefix
  const cleaned = task.replace(/^RESUMING interrupted job\..*?\n\nOriginal task:\n/s, '')
                       .replace(/^RESUMING interrupted job\..+$/m, '').trim();
  const firstLine = cleaned.split('\n')[0].trim();
  return firstLine.slice(0, 80) || '(task)';
}

function makeCard(job, n) {
  const card = document.createElement('div');
  const status = job.status || 'unknown';
  card.className = `tcard ${status}`;
  card.id = `card-${job.id}`;

  const repoStr = shortRepo(job.repoUrl);
  const taskStr = shortTask(job.task);
  const idShort = job.id.slice(0, 8);

  card.innerHTML = `
    <div class="card-hdr">
      <span class="card-num">${n} ·</span>
      <span class="card-title" title="${escHtml(taskStr)}">${escHtml(taskStr)}</span>
      <span class="card-status-badge badge-${status}">${status.replace('_',' ')}</span>
      <span class="card-id">#${idShort}</span>
      <div class="card-dots">
        <div class="card-dot dot-r"></div>
        <div class="card-dot dot-y"></div>
        <div class="card-dot dot-g"></div>
      </div>
    </div>
    <div class="card-repo">
      <span class="card-repo-icon">⎇</span>
      <span>${escHtml(repoStr)}</span>
      ${job.branch ? `<span class="card-branch">${escHtml(job.branch)}</span>` : ''}
      ${job.dockerIsolation ? `<span class="card-docker-badge" title="Running in Docker container">🐳 isolated</span>` : ''}
    </div>
    <div class="card-term"></div>
    <div class="card-foot">
      <span class="card-prompt">
        <span class="prompt-arrow">▶▶</span>
        <span>${status === 'running' ? 'claude running' : status}</span>
      </span>
      <span class="card-foot-meta">${timeAgo(job.startedAt)}</span>
    </div>
  `;

  const logEl = card.querySelector('.card-term');
  return { card, logEl };
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Sidebar item ───────────────────────────────────────────────────────────
function makeSidebarItem(job) {
  const item = document.createElement('div');
  item.className = `job-item`;
  item.id = `si-${job.id}`;
  item.dataset.startedAt = job.startedAt || '';
  const status = job.status || 'unknown';

  item.innerHTML = `
    <div class="ji-top">
      <div class="ji-status ${status}"></div>
      <span class="ji-repo">${escHtml(shortRepo(job.repoUrl))}</span>
      <span class="ji-time">${timeAgo(job.startedAt)}</span>
    </div>
    <div class="ji-task">${escHtml(shortTask(job.task))}</div>
  `;

  item.addEventListener('click', () => focusCard(job.id));
  return item;
}

function focusCard(id) {
  // Highlight sidebar
  document.querySelectorAll('.job-item').forEach(e => e.classList.remove('active'));
  const si = $(`si-${id}`);
  if (si) { si.classList.add('active'); si.scrollIntoView({ block: 'nearest' }); }

  const entry = jobs[id];
  const card = $(`card-${id}`);
  if (!card) return;

  // If card is hidden by filter, switch to 'all'
  if (card.style.display === 'none') {
    document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
    document.querySelector('.fbtn[data-filter="all"]').classList.add('active');
    filterMode = 'all';
    applyFilter();
  }

  // Walk offsetParent chain up to inner for accurate canvas coordinates
  let cx = 0, cy = 0, el = card;
  while (el && el !== inner) { cx += el.offsetLeft; cy += el.offsetTop; el = el.offsetParent; }
  const cardW = card.offsetWidth  || 460;
  const cardH = card.offsetHeight || 370;
  const vw = viewport.clientWidth, vh = viewport.clientHeight;
  ox = vw/2 - (cx + cardW/2) * scale;
  oy = vh/2 - (cy + cardH/2) * scale;
  applyTransform();

  // Scroll terminal to bottom
  if (entry?.logEl) entry.logEl.scrollTop = entry.logEl.scrollHeight;
}

// ── Update sidebar counts ──────────────────────────────────────────────────
function updateCounts() {
  let running=0, pending=0, done=0, failed=0;
  for (const { job } of Object.values(jobs)) {
    if (job.status === 'running' || job.status === 'cloning') running++;
    else if (job.status === 'pending_approval') pending++;
    else if (job.status === 'done') done++;
    else if (job.status === 'failed') failed++;
  }
  $('c-running').textContent = running;
  $('c-pending').textContent = pending;
  $('c-done').textContent    = done;
  $('c-failed').textContent  = failed;
}

// ── Apply filter to sidebar + canvas ──────────────────────────────────────
function applyFilter() {
  for (const { job, card } of Object.values(jobs)) {
    const show = filterMode === 'all'
      || (filterMode === 'running' && ['running','cloning','pending_approval'].includes(job.status))
      || (filterMode === 'done' && job.status === 'done')
      || (filterMode === 'failed' && job.status === 'failed');
    const item = $(`si-${job.id}`);
    if (item) item.style.display = show ? '' : 'none';
    if (card) card.style.display = show ? '' : 'none';
  }
  // Hide columns with no visible cards
  for (const [key, col] of Object.entries(cols)) {
    const hasVisible = [...col.cardsEl.children].some(c => c.style.display !== 'none');
    col.el.style.display = hasVisible ? '' : 'none';
  }
}

document.querySelectorAll('.fbtn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filterMode = btn.dataset.filter;
    applyFilter();
  });
});

// ── Column helpers ─────────────────────────────────────────────────────────
function repoKey(job) {
  return shortRepo(job.repoUrl) || 'local';
}

function getOrCreateCol(key) {
  if (cols[key]) return cols[key];
  const el = document.createElement('div');
  el.className = 'repo-col';
  el.id = `col-${key.replace(/[^a-z0-9]/gi, '-')}`;
  el.innerHTML = `
    <div class="col-header">
      <span class="col-repo-icon">⎇</span>
      <span class="col-repo-name" title="${escHtml(key)}">${escHtml(key)}</span>
      <span class="col-counts"></span>
    </div>
    <div class="col-cards"></div>
  `;
  cols[key] = { el, cardsEl: el.querySelector('.col-cards') };
  inner.appendChild(el);
  return cols[key];
}

function insertCardInColumn(key, card, job) {
  const { cardsEl } = cols[key];
  const t = new Date(job.startedAt || 0).getTime();
  for (const sib of cardsEl.children) {
    const sibJob = jobs[sib.id.replace('card-', '')]?.job;
    if (t >= new Date(sibJob?.startedAt || 0).getTime()) {
      cardsEl.insertBefore(card, sib);
      return;
    }
  }
  cardsEl.appendChild(card);
}

function updateColHeader(key) {
  const col = cols[key];
  if (!col) return;
  const colJobs = Object.values(jobs).filter(e => repoKey(e.job) === key);
  const running = colJobs.filter(e => ['running','cloning','pending_approval'].includes(e.job.status)).length;
  const el = col.el.querySelector('.col-counts');
  if (!el) return;
  if (running > 0) {
    el.textContent = `${running} live · ${colJobs.length}`;
    el.className = 'col-counts live';
  } else {
    el.textContent = `${colJobs.length}`;
    el.className = 'col-counts';
  }
}

function sortColumns() {
  // Order columns by their most recent job's startedAt, descending
  const keys = Object.keys(cols).sort((a, b) => {
    const latest = key => Math.max(0, ...Object.values(jobs)
      .filter(e => repoKey(e.job) === key)
      .map(e => new Date(e.job.startedAt || 0).getTime()));
    return latest(b) - latest(a);
  });
  for (const key of keys) inner.appendChild(cols[key].el);
}

// ── Handle snapshot (initial load) ────────────────────────────────────────
function handleSnapshot(data) {
  // Sort purely by time descending — columns handle repo grouping visually
  const sorted = [...data.jobs].sort((a, b) =>
    new Date(b.startedAt||0) - new Date(a.startedAt||0)
  );
  for (const job of sorted) addJob(job, job.lines || []);
  sortColumns();
  updateCounts();
  applyFilter();
  if (Object.keys(jobs).length > 0) emptyState.style.display = 'none';
  if (typeof hideLoader === 'function') hideLoader();
}

function addJob(job, lines) {
  if (jobs[job.id]) return;
  jobCounter++;
  const { card, logEl } = makeCard(job, jobCounter);
  const key = repoKey(job);
  getOrCreateCol(key);
  insertCardInColumn(key, card, job);
  const sidebarItem = makeSidebarItem(job);
  const jobTime = new Date(job.startedAt || 0).getTime();
  const after = Array.from(jobList.children).find(el =>
    new Date(el.dataset.startedAt || 0).getTime() < jobTime
  );
  if (after) jobList.insertBefore(sidebarItem, after);
  else jobList.appendChild(sidebarItem);
  jobs[job.id] = { job: { ...job }, card, logEl, n: jobCounter };
  if (lines.length) appendLines(logEl, lines, false);
  else if (job.status === 'running' || job.status === 'cloning') setWorkingIndicator(logEl, true);
  updateColHeader(key);
  wireCardClick(card, job.id);
}

// ── Handle job update ──────────────────────────────────────────────────────
function handleJobUpdate(data) {
  const job = data.job;
  const entry = jobs[job.id];

  if (!entry) {
    // New job we haven't seen yet
    addJob(job, []);
    emptyState.style.display = 'none';
    updateCounts();
    applyFilter();
    return;
  }

  const prev = entry.job.status;
  entry.job = { ...entry.job, ...job };
  const status = job.status;

  // Working indicator
  if (status === 'running' || status === 'cloning') setWorkingIndicator(entry.logEl, true);
  else setWorkingIndicator(entry.logEl, false);

  // Update card class
  entry.card.className = `tcard ${status}`;

  // Update badge
  const badge = entry.card.querySelector('.card-status-badge');
  if (badge) { badge.className = `card-status-badge badge-${status}`; badge.textContent = status.replace('_',' '); }

  // Update prompt
  const prompt = entry.card.querySelector('.card-prompt span:last-child');
  if (prompt) prompt.textContent = status === 'running' ? 'claude running' : status;

  // Flash
  if (status === 'done' && prev !== 'done') {
    entry.card.classList.add('flash-ok');
    setTimeout(() => entry.card.classList.remove('flash-ok'), 900);
  }
  if (status === 'failed' && prev !== 'failed') {
    entry.card.classList.add('flash-err');
    setTimeout(() => entry.card.classList.remove('flash-err'), 900);
  }

  // Update sidebar dot
  const dot = $(`si-${job.id}`)?.querySelector('.ji-status');
  if (dot) { dot.className = `ji-status ${status}`; }

  // Refresh job panel if this job is open
  if (jpCurrentId === job.id) {
    jpMeta.querySelector('.jp-badge').className = `jp-badge badge-${status}`;
    jpMeta.querySelector('.jp-badge').textContent = status.replace('_', ' ');
    renderActions(status);
    const msgBar = $('jp-msg-bar');
    if (status === 'running') msgBar.classList.remove('hidden');
    else msgBar.classList.add('hidden');
  }

  updateColHeader(repoKey(job));
  updateCounts();
  applyFilter();
}

// ── Handle job_new ─────────────────────────────────────────────────────────
function handleJobNew(data) {
  addJob(data.job, data.job.lines || []);
  sortColumns();
  emptyState.style.display = 'none';
  updateCounts();
  applyFilter();
}

// ── Handle output ──────────────────────────────────────────────────────────
function handleOutput(data) {
  const entry = jobs[data.id];
  if (!entry) return;
  appendLines(entry.logEl, data.lines, true);
  // Mirror to job panel if open
  if (jpCurrentId === data.id) {
    appendLines(jpLog, data.lines, true);
  }
}

// ── WebSocket ──────────────────────────────────────────────────────────────
function connect() {
  const ws = new WebSocket(`ws://${location.host}`);
  const dot = $('ws-dot');

  ws.onopen = () => { dot.className = 'ok'; };
  ws.onclose = () => { dot.className = 'err'; setTimeout(connect, 2000); };
  ws.onerror = () => dot.className = 'err';

  ws.onmessage = ({ data }) => {
    let evt;
    try { evt = JSON.parse(data); } catch { return; }
    switch (evt.type) {
      case 'snapshot':   handleSnapshot(evt); break;
      case 'job_update': handleJobUpdate(evt); break;
      case 'job_new':    handleJobNew(evt); break;
      case 'job_output': handleOutput(evt); break;
    }
  };
}

// ── Job Detail Panel ───────────────────────────────────────────────────────
const jp = $('jobpanel');
const jpLog = $('jp-log');
const jpTitle = $('jp-title');
const jpMeta = $('jp-meta');
const jpTask = $('jp-task');
const jpActions = $('jp-actions');
let jpCurrentId = null;

function jpClose() {
  jp.classList.remove('open');
  jpCurrentId = null;
}

async function jpSendMessage() {
  const input = $('jp-msg-input');
  const btn = $('jp-msg-send');
  const text = input.value.trim();
  if (!text || !jpCurrentId) return;
  input.value = '';
  btn.disabled = true;
  try {
    const r = await fetch('/api/job/action', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: jpCurrentId, action: 'message', message: text }),
    });
    await r.json();
  } catch (e) {
    const d = document.createElement('div');
    d.className = 'tl tl-err';
    d.textContent = `[ui] Error: ${e.message}`;
    jpLog.appendChild(d);
  } finally {
    btn.disabled = false;
    input.focus();
  }
}

// Enter key submits message
document.addEventListener('DOMContentLoaded', () => {
  $('jp-msg-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); jpSendMessage(); }
  });
});

async function jpOpen(id) {
  const entry = jobs[id];
  if (!entry) return;
  jpCurrentId = id;
  jp.classList.add('open');

  const job = entry.job;
  const status = job.status || 'unknown';

  jpTitle.textContent = shortTask(job.task);
  jpTask.innerHTML = `<strong>Task</strong>${escHtml(job.task || '(no task)')}`;

  // Meta
  jpMeta.innerHTML = `
    <span class="jp-badge badge-${status}">${status.replace('_',' ')}</span>
    <span class="jp-meta-row">repo <span>${escHtml(shortRepo(job.repoUrl) || 'local')}</span>
      ${job.branch ? ` · branch <span>${escHtml(job.branch)}</span>` : ''}
      ${job.dockerIsolation ? ` · <span style="color:#38bdf8">🐳 docker isolated</span>` : ''}
    </span>
    <span class="jp-meta-row">id <span>${escHtml(job.id || id)}</span></span>
    <span class="jp-meta-row">started <span>${job.startedAt ? new Date(job.startedAt).toLocaleString() : '—'}</span></span>
  `;

  // Actions
  renderActions(status);

  // Show/hide message bar
  const msgBar = $('jp-msg-bar');
  if (status === 'running') {
    msgBar.classList.remove('hidden');
    setTimeout(() => $('jp-msg-input').focus(), 50);
  } else {
    msgBar.classList.add('hidden');
  }

  // Load full log
  jpLog.innerHTML = '<div style="color:var(--dim);padding:4px">loading…</div>';
  try {
    const r = await fetch(`/api/job/output?id=${encodeURIComponent(id)}`);
    const data = await r.json();
    jpLog.innerHTML = '';
    appendLines(jpLog, data.lines || [], false);
    jpLog.scrollTop = jpLog.scrollHeight;
  } catch (e) {
    jpLog.innerHTML = `<div style="color:var(--red)">${escHtml(e.message)}</div>`;
  }
}

function renderActions(status) {
  jpActions.innerHTML = '';
  const add = (label, cls, action, extra = {}) => {
    const b = document.createElement('button');
    b.className = `jp-btn ${cls}`;
    b.textContent = label;
    if (extra.disabled) b.disabled = true;
    b.addEventListener('click', () => jobAction(jpCurrentId, action));
    jpActions.appendChild(b);
  };

  if (status === 'pending_approval') add('✓ Approve', 'approve', 'approve');
  if (['running','cloning','pending_approval'].includes(status)) add('✕ Cancel', 'cancel', 'cancel');
  if (status === 'failed' || status === 'cancelled') add('⟳ Wake', 'wake', 'wake');
  if (jpActions.children.length === 0) {
    jpActions.innerHTML = `<span style="font-size:10px;color:var(--dim)">no actions available for ${status} jobs</span>`;
  }
}

async function jobAction(id, action) {
  if (!id) return;
  const btns = jpActions.querySelectorAll('.jp-btn');
  btns.forEach(b => b.disabled = true);
  try {
    const r = await fetch('/api/job/action', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id, action }),
    });
    const data = await r.json();
    if (data.ok) {
      // Append confirmation to panel log
      const d = document.createElement('div');
      d.className = 'tl tl-ok';
      d.textContent = `[ui] Action "${action}" sent`;
      jpLog.appendChild(d);
      jpLog.scrollTop = jpLog.scrollHeight;
    }
  } catch (e) {
    const d = document.createElement('div');
    d.className = 'tl tl-err';
    d.textContent = `[ui] Error: ${e.message}`;
    jpLog.appendChild(d);
  } finally {
    btns.forEach(b => b.disabled = false);
  }
}

// Wire card clicks to open job panel
function wireCardClick(card, id) {
  card.querySelector('.card-hdr').addEventListener('click', (e) => {
    if (e.target.closest('.tl-path')) return; // don't interfere with file links
    jpOpen(id);
  });
}

// ── File Browser Modal ─────────────────────────────────────────────────────
const fbBackdrop = $('fb-backdrop');
const fbBody = $('fb-body');
const fbPathEl = $('fb-path');
let fbHistory = [];

function fbOpen(p) {
  fbBackdrop.classList.remove('hidden');
  fbNavigate(p);
}

function fbClose() {
  fbBackdrop.classList.add('hidden');
  fbHistory = [];
}

function fbGoBack() {
  if (fbHistory.length > 1) {
    fbHistory.pop();
    fbNavigate(fbHistory.pop(), true);
  }
}

function fbParentDir(p) {
  const trimmed = p.replace(/\/+$/, '');
  if (!trimmed || trimmed === '/') return null;
  const parent = trimmed.replace(/\/[^/]+$/, '') || '/';
  return parent;
}

async function fbNavigate(p, fromBack) {
  if (!fromBack) fbHistory.push(p);
  fbPathEl.textContent = p;
  fbBody.innerHTML = '<div style="padding:14px;color:var(--dim)">loading…</div>';
  try {
    const statRes = await fetch(`/api/fs/stat?path=${encodeURIComponent(p)}`);
    if (!statRes.ok) throw new Error(await statRes.text());
    const stat = await statRes.json();
    if (!stat.exists) throw new Error('not found: ' + p);

    if (stat.type === 'dir') {
      const lsRes = await fetch(`/api/fs/ls?path=${encodeURIComponent(p)}`);
      if (!lsRes.ok) throw new Error(await lsRes.text());
      const data = await lsRes.json();
      renderDir(p, data.entries);
    } else {
      renderFile(p);
    }
  } catch (e) {
    fbBody.innerHTML = `<div style="padding:14px;color:var(--red)">${escHtml(e.message)}</div>`;
  }
}

function fmtSize(n) {
  if (n == null) return '';
  if (n < 1024) return n + 'B';
  if (n < 1048576) return (n/1024).toFixed(1) + 'KB';
  return (n/1048576).toFixed(1) + 'MB';
}

function fileIcon(name, type) {
  if (type === 'dir') return '📁';
  const ext = name.split('.').pop().toLowerCase();
  if (['js','ts','tsx','jsx','py','go','rs','sh','clj','cljs','sql'].includes(ext)) return '📄';
  if (['png','jpg','jpeg','gif','svg','webp'].includes(ext)) return '🖼';
  if (['mp4','webm','mov'].includes(ext)) return '🎬';
  if (['mp3','wav','ogg'].includes(ext)) return '🎵';
  if (ext === 'pdf') return '📋';
  if (['md','txt'].includes(ext)) return '📝';
  if (ext === 'json') return '{}';
  if (['yaml','yml'].includes(ext)) return '⚙';
  return '📄';
}

function renderDir(basePath, entries) {
  const frag = document.createDocumentFragment();

  // Parent dir entry
  const parent = fbParentDir(basePath);
  if (parent) {
    const up = document.createElement('div');
    up.className = 'fb-entry';
    up.innerHTML = `<span class="fb-icon">↑</span><span class="fb-name" style="color:var(--dim)">parent directory</span><span class="fb-size"></span>`;
    up.addEventListener('click', () => fbNavigate(parent));
    frag.appendChild(up);
  }

  for (const e of entries) {
    const entryPath = basePath.replace(/\/$/, '') + '/' + e.name;
    const row = document.createElement('div');
    row.className = `fb-entry${e.type === 'dir' ? ' is-dir' : ''}`;
    row.innerHTML = `<span class="fb-icon">${fileIcon(e.name, e.type)}</span><span class="fb-name">${escHtml(e.name + (e.type === 'dir' ? '/' : ''))}</span><span class="fb-size">${fmtSize(e.size)}</span>`;
    row.addEventListener('click', () => fbNavigate(entryPath));
    frag.appendChild(row);
  }

  fbBody.innerHTML = '';
  if (entries.length === 0 && !parent) {
    fbBody.innerHTML = '<div style="padding:14px;color:var(--dim)">empty directory</div>';
  } else {
    fbBody.appendChild(frag);
  }
}

async function renderFile(p) {
  const ext = p.split('.').pop().toLowerCase();
  const rawUrl = `/api/fs/raw?path=${encodeURIComponent(p)}`;
  const div = document.createElement('div');
  div.id = 'fb-file-view';

  const imageExts = ['png','jpg','jpeg','gif','svg','webp'];
  const videoExts = ['mp4','webm','mov'];
  const audioExts = ['mp3','wav','ogg'];
  const textExts = ['js','ts','tsx','jsx','py','go','rs','md','json','yaml','yml',
                    'sh','bash','html','css','txt','log','clj','cljs','sql','toml',
                    'env','gitignore','dockerfile','makefile','lock'];

  if (imageExts.includes(ext)) {
    div.className = 'media-view';
    div.innerHTML = `<img src="${rawUrl}" alt="${escHtml(p)}">`;
    fbBody.innerHTML = '';
    fbBody.appendChild(div);
  } else if (videoExts.includes(ext)) {
    div.className = 'media-view';
    div.innerHTML = `<video controls src="${rawUrl}"></video>`;
    fbBody.innerHTML = '';
    fbBody.appendChild(div);
  } else if (audioExts.includes(ext)) {
    div.className = 'media-view';
    div.innerHTML = `<audio controls src="${rawUrl}"></audio>`;
    fbBody.innerHTML = '';
    fbBody.appendChild(div);
  } else if (textExts.includes(ext) || !ext || p.split('/').pop().indexOf('.') === -1) {
    div.style.cssText = 'padding:12px 14px;font-size:11px;line-height:1.65;white-space:pre-wrap;word-break:break-all;color:var(--text);overflow:auto;flex:1';
    div.textContent = 'loading…';
    fbBody.innerHTML = '';
    fbBody.appendChild(div);
    try {
      const r = await fetch(`/api/fs/cat?path=${encodeURIComponent(p)}`);
      if (!r.ok) { div.style.color = 'var(--red)'; div.textContent = await r.text(); return; }
      const data = await r.json();
      div.textContent = data.content;
    } catch (e) {
      div.style.color = 'var(--red)';
      div.textContent = e.message;
    }
  } else {
    div.innerHTML = `<div style="color:var(--dim);padding:14px">Binary file — <a href="${rawUrl}" download style="color:var(--cyan)">download</a></div>`;
    fbBody.innerHTML = '';
    fbBody.appendChild(div);
  }
}

// ── File path detection in terminal lines ─────────────────────────────────
function escAttr(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// Delegated click handler for .tl-path spans
document.addEventListener('click', e => {
  const link = e.target.closest('.tl-path');
  if (link) {
    e.stopPropagation();
    fetch('/api/open?path=' + encodeURIComponent(link.dataset.path));
  }
});

function linkifyPaths(text) {
  // Process in segments: URL first, then file paths, then escape remainder.
  // This prevents https://github.com/... from being mis-matched as a file path.
  const URL_RE  = /https?:\/\/[^\s<>"')\]]+/g;
  const PATH_RE = /(?<![:/])(\/(var|Users|home|tmp|workspace|root|opt)\/[^\s"'`,;()[\]<>]{3,})/g;

  // Build a list of non-overlapping segments
  const spans = [];

  let m;
  URL_RE.lastIndex = 0;
  while ((m = URL_RE.exec(text)) !== null) {
    spans.push({ type: 'url', value: m[0], start: m.index, end: m.index + m[0].length });
  }

  PATH_RE.lastIndex = 0;
  while ((m = PATH_RE.exec(text)) !== null) {
    const start = m.index, end = m.index + m[0].length;
    // Skip if overlapping with an already-captured URL span
    if (spans.some(s => s.type === 'url' && start < s.end && end > s.start)) continue;
    spans.push({ type: 'path', value: m[0], start, end });
  }

  // Sort by start position; URLs win over paths when overlapping
  spans.sort((a, b) => a.start - b.start);

  const parts = [];
  let last = 0;
  for (const sp of spans) {
    if (sp.start < last) continue; // overlapping — skip
    if (sp.start > last) parts.push(escHtml(text.slice(last, sp.start)));
    if (sp.type === 'url') {
      parts.push(`<a href="${escAttr(sp.value)}" target="_blank" rel="noopener" class="tl-url">${escHtml(sp.value)}</a>`);
    } else {
      parts.push(`<span class="tl-path" data-path="${escAttr(sp.value)}">${escHtml(sp.value)}</span>`);
    }
    last = sp.end;
  }
  if (last < text.length) parts.push(escHtml(text.slice(last)));
  return parts.join('');
}

// ── Loading overlay ────────────────────────────────────────────────────────
(function() {
  const overlay = document.getElementById('loading-overlay');
  const spinnerEl = document.getElementById('loading-spinner');
  const textEl = document.getElementById('loading-text');
  const frames = ['⣾','⣽','⣻','⢿','⡿','⣟','⣯','⣷'];
  let frame = 0;
  const spinInterval = setInterval(() => {
    spinnerEl.textContent = frames[frame++ % frames.length];
  }, 100);

  let snapshotReceived = false;
  const fallbackTimer = setTimeout(() => {
    if (!snapshotReceived) {
      textEl.textContent = 'Reconnecting…';
    }
  }, 8000);

  window.hideLoader = function() {
    snapshotReceived = true;
    clearInterval(spinInterval);
    clearTimeout(fallbackTimer);
    overlay.style.display = 'none';
  };
})();

// ── Tab switching ──────────────────────────────────────────────────────────
const mainEl     = $('main');
const cronsPanel = $('crons-panel');
const chatPanel  = $('chat-panel');

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const tab = btn.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (tab === 'jobs') {
      mainEl.style.display = 'flex';
      cronsPanel.classList.remove('active');
      chatPanel.classList.remove('active');
    } else if (tab === 'crons') {
      mainEl.style.display = 'none';
      cronsPanel.classList.add('active');
      chatPanel.classList.remove('active');
      cronLoad();
    } else if (tab === 'chat') {
      mainEl.style.display = 'none';
      cronsPanel.classList.remove('active');
      chatPanel.classList.add('active');
      chatInit();
    }
  });
});

// ── Crons ─────────────────────────────────────────────────────────────────
let cronPollTimer = null;
let cronFormVisible = false;

function cronToggleForm() {
  cronFormVisible = !cronFormVisible;
  const form = $('cron-add-form');
  if (cronFormVisible) {
    form.classList.add('visible');
    $('cf-name').focus();
  } else {
    form.classList.remove('visible');
    cronClearForm();
  }
}

function cronClearForm() {
  $('cf-name').value = '';
  $('cf-schedule').value = '';
  $('cf-repo').value = '';
  $('cf-prompt').value = '';
  $('cf-enabled').checked = true;
}

function fmtTs(iso) {
  if (!iso) return '—';
  try {
    const d = new Date(iso);
    return d.toLocaleString();
  } catch { return iso; }
}

function renderCrons(crons) {
  const list = $('cron-list');
  if (!crons.length) {
    list.innerHTML = '<div class="cron-empty">No crons yet. Click "+ Add Cron" to create one.</div>';
    return;
  }
  list.innerHTML = '';
  for (const c of crons) {
    const repoShort = (c.repoUrl || '').length > 40 ? c.repoUrl.slice(0, 40) + '…' : (c.repoUrl || '—');
    const card = document.createElement('div');
    card.className = 'cron-card';
    card.innerHTML = `
      <div class="cron-card-main">
        <div class="cron-card-name">${escHtml(c.name || '(unnamed)')}</div>
        <div class="cron-card-meta">
          <div class="cron-meta-item">schedule: <span>${escHtml(c.schedule || '—')}</span></div>
          <div class="cron-meta-item">repo: <span title="${escHtml(c.repoUrl || '')}">${escHtml(repoShort)}</span></div>
        </div>
        <div class="cron-card-prompt">${escHtml(c.prompt || '')}</div>
        <div class="cron-card-times">
          <div class="cron-time-item">last run: <span>${fmtTs(c.lastRun)}</span></div>
          <div class="cron-time-item">next run: <span>${fmtTs(c.nextRun)}</span></div>
        </div>
      </div>
      <div class="cron-card-actions">
        <label class="cron-toggle" title="${c.enabled ? 'Enabled' : 'Disabled'}">
          <input type="checkbox" ${c.enabled ? 'checked' : ''} data-id="${escHtml(c.id)}">
          <div class="cron-toggle-track"></div>
          <div class="cron-toggle-thumb"></div>
        </label>
        <button class="cron-delete-btn" data-id="${escHtml(c.id)}" title="Delete cron">×</button>
      </div>`;
    // Toggle enabled
    card.querySelector('.cron-toggle input').addEventListener('change', async e => {
      e.stopPropagation();
      const enabled = e.target.checked;
      try {
        await fetch(`/crons/${c.id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ enabled }),
        });
      } catch (err) { console.error('patch cron', err); }
    });
    // Delete
    card.querySelector('.cron-delete-btn').addEventListener('click', async e => {
      e.stopPropagation();
      if (!confirm(`Delete cron "${c.name}"?`)) return;
      try {
        await fetch(`/crons/${c.id}`, { method: 'DELETE' });
        await cronLoad();
      } catch (err) { console.error('delete cron', err); }
    });
    list.appendChild(card);
  }
}

async function cronLoad() {
  try {
    const r = await fetch('/crons');
    if (!r.ok) throw new Error(await r.text());
    const crons = await r.json();
    renderCrons(crons);
  } catch (e) {
    $('cron-list').innerHTML = `<div class="cron-empty" style="color:var(--red)">Error loading crons: ${escHtml(e.message)}</div>`;
  }
}

async function cronSubmit() {
  const name = $('cf-name').value.trim();
  const schedule = $('cf-schedule').value.trim();
  const repoUrl = $('cf-repo').value.trim();
  const prompt = $('cf-prompt').value.trim();
  const enabled = $('cf-enabled').checked;
  if (!name || !schedule || !repoUrl || !prompt) {
    alert('Please fill in all fields.');
    return;
  }
  try {
    const r = await fetch('/crons', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, schedule, repoUrl, prompt, enabled }),
    });
    if (!r.ok) throw new Error(await r.text());
    cronClearForm();
    cronToggleForm();
    await cronLoad();
  } catch (e) {
    alert('Error creating cron: ' + e.message);
  }
}

// Poll crons every 10s when panel is active
setInterval(() => {
  if (cronsPanel.classList.contains('active')) cronLoad();
}, 10000);

// ── Chat ─────────────────────────────────────────────────────────────────
let chatInitialized = false;
let chatSSE = null;

function escHtmlChat(s) { return escHtml(s); }

function chatMsgEl(msg) {
  const isUser = msg.role === 'user';
  const isTool = msg.role === 'tool';
  const isTg   = msg.source === 'telegram';
  const div = document.createElement('div');
  div.dataset.id = msg.id || '';
  const ts = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString() : '';

  if (isTool) {
    div.className = 'chat-msg tool';
    const content = msg.content || '';
    const m = content.match(/^\[tool\]\s+([\w-]+):\s+(\{.*\})$/s);
    let bubbleInner;
    if (m) {
      const toolName = escHtml(m[1]);
      let rows = '';
      try {
        const args = JSON.parse(m[2]);
        for (const [k, v] of Object.entries(args)) {
          const val = String(v).length > 300 ? String(v).slice(0, 300) + '…' : String(v);
          rows += `<div><span class="chat-tool-arg">${escHtml(k)}:</span> <span class="chat-tool-val">${escHtml(val)}</span></div>`;
        }
      } catch {
        rows = `<div><span class="chat-tool-val">${escHtml(m[2])}</span></div>`;
      }
      bubbleInner = `<span class="chat-tool-name">[tool] ${toolName}</span>${rows}`;
    } else {
      bubbleInner = escHtml(content);
    }
    div.innerHTML = `<div class="chat-bubble">${bubbleInner}</div><div class="chat-msg-meta">${ts}</div>`;
  } else {
    div.className = `chat-msg ${isUser ? 'user' : 'assistant'}`;
    div.innerHTML = `
      <div class="chat-bubble">${escHtml(msg.content || '')}</div>
      <div class="chat-msg-meta">
        ${ts}
        ${isTg ? '<span class="chat-badge-tg">📱 Telegram</span>' : ''}
      </div>`;
  }
  return div;
}

function chatAppend(msg) {
  const messagesEl = $('chat-messages');
  const el = chatMsgEl(msg);
  messagesEl.appendChild(el);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

async function chatInit() {
  if (chatInitialized) return;
  chatInitialized = true;

  // Load history
  try {
    const r = await fetch('/chat/history');
    if (r.ok) {
      const msgs = await r.json();
      const messagesEl = $('chat-messages');
      messagesEl.innerHTML = '';
      for (const m of msgs) chatAppend(m);
    }
  } catch (e) { console.error('chat history', e); }

  // SSE
  chatSSE = new EventSource('/chat/stream');
  chatSSE.onmessage = e => {
    try {
      const msg = JSON.parse(e.data);
      // Deduplicate: skip if we already have this id (sent by us)
      if (msg.id && document.querySelector(`[data-id="${CSS.escape(msg.id)}"]`)) return;
      chatAppend(msg);
    } catch {}
  };
  chatSSE.onerror = () => { console.warn('chat SSE disconnected, will retry'); };

  const ta = $('chat-textarea');
  ta.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); chatSend(); }
  });
  ta.addEventListener('input', () => {
    ta.style.height = '0';
    ta.style.height = ta.scrollHeight + 'px';
  });
}

async function chatSend() {
  const ta = $('chat-textarea');
  const message = ta.value.trim();
  if (!message) return;
  const btn = $('chat-send-btn');
  btn.disabled = true;
  try {
    const r = await fetch('/chat/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message }),
    });
    if (!r.ok) throw new Error(await r.text());
    const msg = await r.json();
    ta.value = '';
    ta.style.height = '';
    chatAppend(msg);
  } catch (e) {
    alert('Error sending message: ' + e.message);
  } finally {
    btn.disabled = false;
    ta.focus();
  }
}

// ── Version badge ─────────────────────────────────────────────────────────
async function fetchVersions() {
  try {
    const r = await fetch('/versions');
    if (!r.ok) return;
    const v = await r.json();
    const badge = document.getElementById('version-badge');
    if (!badge) return;
    const fmt = (label, val) => {
      const cls = val === 'unknown' ? ' class="vb-unknown"' : '';
      return `<span${cls}>${label}:${val}</span>`;
    };
    badge.innerHTML = [
      fmt('ui', v['cc-agent-ui'] || 'unknown'),
      fmt('agent', v['cc-agent'] || 'unknown'),
      fmt('tg', v['cc-tg'] || 'unknown'),
    ].join(' &nbsp;');
  } catch {}
}
fetchVersions();
setInterval(fetchVersions, 60000);
